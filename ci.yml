name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Build synthetic registry
        run: python -m context_governance build --root examples/synthetic_saas

      - name: Validate synthetic registry
        run: python -m context_governance validate --root examples/synthetic_saas

      - name: Score evaluation fixtures
        run: python evals/score_outputs.py

      - name: Test
        run: python -m pytest -q
